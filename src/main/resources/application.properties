spring.application.name=libms

# __ DataSource (PostgreSQL) ______________________________
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

#server.port=8080
server.port=${PORT:8080} 

# Hibernate/JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true 

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false

#Jwt
jwt.secret=josh-very-long_-secret-key-.at-least-256-bits-long.9
jwt.access-token-expiry-ms=300000
jwt.refresh-token-expiry-ms=36000000