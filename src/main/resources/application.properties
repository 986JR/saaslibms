spring.application.name=libms

# __ DataSource (PostgreSQL) ______________________________
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

#server.port=8080
server.port=${PORT:8080} 

# Hibernate/JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true 

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false

#Jwt
jwt.secret=${JWT_SECRET}
jwt.access-token-expiry-ms=300000
jwt.refresh-token-expiry-ms=36000000 

#Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USER}
spring.mail.password=${MAIL_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.default-encoding=UTF-8

#CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

app.base-url=http://localhost:5173
app.password-reset.expiry-minutes=5

# Redis connection
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Enable Spring's cache abstraction
spring.cache.type=redis 

# ?? Actuator endpoint exposure
# Expose only the endpoints we need ? never expose all (*) in production.
# health     ? app health check (used by load balancers and monitoring tools)
# metrics    ? individual metric lookup  (e.g. /actuator/metrics/jvm.memory.used)
# prometheus ? full Prometheus scrape endpoint
# info       ? app info (version, description)
management.endpoints.web.exposure.include=health,metrics,prometheus,info
management.endpoint.metrics.enabled=true
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=always

# ?? Actuator base path
# Move actuator OFF the default /actuator path onto our system namespace.
# This keeps actuator behind our existing JWT + SUPER_ADMIN security.
# NOTE: After this change, health check is at:
#   /api/v1/system/actuator/health
# Add /api/v1/system/actuator/** to the SecurityConfig permitAll list
# ONLY for /health if you need load balancer health checks without auth.
# All other actuator endpoints stay protected (require SUPER_ADMIN).
management.endpoints.web.base-path=/api/v1/system/actuator

# ?? JVM and system metrics
# Enable all standard JVM metrics: heap, non-heap, GC, threads, CPU
management.metrics.enable.jvm=true
management.metrics.enable.system=true
management.metrics.enable.process=true

# ?? HikariCP (DB connection pool) metrics
# Exposes: hikaricp.connections.active, hikaricp.connections.idle,
#          hikaricp.connections.pending, hikaricp.connections.max
spring.datasource.hikari.pool-name=LibmsHikariPool
management.metrics.enable.hikaricp=true

# ?? HTTP server request metrics
# Micrometer automatically records http.server.requests with tags:
# method, uri (normalized), status, exception
management.metrics.enable.http=true

# ?? Application info (shown at /actuator/info)

info.app.name=Library Management System
info.app.version=1.0.0
info.app.description=Multi-tenant SaaS Library Management System